name: 🐋 Build Docker Images (Linux)

on:
  workflow_dispatch:
    inputs:
      workload_set_version:
        description: 'Specific workload set version to use'
        required: false
        type: string
      dotnet_versions:
        description: 'JSON array of .NET versions to build (e.g., ["9.0", "10.0"])'
        required: false
        type: string
        default: '["9.0", "10.0"]'
  repository_dispatch:
    types: [trigger-docker-linux-build]

permissions:
  contents: read
  packages: write

jobs:
  build-linux:
    name: 🐧 Build Linux (.NET ${{ matrix.DOTNET_VERSION }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        DOTNET_VERSION: ${{ fromJson(inputs.dotnet_versions || '["9.0", "10.0"]') }}

    steps:
    - name: 🛒 Checkout
      uses: actions/checkout@v4

    - name: 📋 Set Variables
      id: vars
      run: |
        # Determine workload set version from either workflow_dispatch input or repository_dispatch payload
        if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
          WORKLOAD_SET_VERSION="${{ github.event.client_payload.workload_set_version }}"
        else
          WORKLOAD_SET_VERSION="${{ inputs.workload_set_version }}"
        fi
        echo "workload_set_version=$WORKLOAD_SET_VERSION" >> $GITHUB_OUTPUT
        echo "Using workload set version: $WORKLOAD_SET_VERSION"

        # Get short Git SHA for unique build tagging
        BUILD_SHA=$(git rev-parse --short=8 HEAD)
        echo "build_sha=$BUILD_SHA" >> $GITHUB_OUTPUT
        echo "Build SHA: $BUILD_SHA"

    - name: 🐋 Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔨 Build Docker Image
      id: build
      shell: pwsh
      run: |
        # Build arguments
        $buildArgs = @{
          DotNetVersion     = "${{ matrix.DOTNET_VERSION }}"
          Version           = "${{ github.run_id }}"
          DockerPlatform    = "linux/amd64"
          BuildSha          = "${{ steps.vars.outputs.build_sha }}"
          Load              = $true
        }
        if ("${{ github.ref }}" -eq "refs/heads/main") {
          $buildArgs.Push = $true
        }
        # Add workload set version if specified
        if ("${{ steps.vars.outputs.workload_set_version }}" -ne "") {
          $buildArgs.WorkloadSetVersion = "${{ steps.vars.outputs.workload_set_version }}"
        }

        ./docker/build.ps1 @buildArgs

    - name: 📋 Generate Build Summary
      if: always()
      shell: bash
      run: |
        echo "## 🐧 Linux Docker Build — .NET ${{ steps.build.outputs.dotnet_version || matrix.DOTNET_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installed Software Versions" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Version |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|---------|" >> $GITHUB_STEP_SUMMARY
        echo "| .NET SDK | ${{ steps.build.outputs.dotnet_version || matrix.DOTNET_VERSION }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Workload Set | ${{ steps.build.outputs.workload_set_version || 'auto-detected' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android SDK API Level | ${{ steps.build.outputs.android_api_level || '—' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android Build Tools | ${{ steps.build.outputs.android_build_tools || '—' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Android Cmdline Tools | ${{ steps.build.outputs.android_cmdline_tools || '—' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| JDK | ${{ steps.build.outputs.jdk_version || '—' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| GitHub Actions Runner | ${{ steps.build.outputs.github_actions_runner || '—' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Platform | ${{ steps.build.outputs.docker_platform || 'linux/amd64' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build SHA | \`${{ steps.vars.outputs.build_sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Image tags
        TAGS="${{ steps.build.outputs.image_tags }}"
        if [ -n "$TAGS" ]; then
          echo "### Image Tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$TAGS" | tr '|' '\n' | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY

          # Pull command using first tag
          FIRST_TAG=$(echo "$TAGS" | cut -d'|' -f1)
          echo "### Quick Start" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull $FIRST_TAG" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        echo "### SBOM" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Software Bill of Materials is embedded in the image at:" >> $GITHUB_STEP_SUMMARY
        echo "- \`/usr/local/share/installed-software.json\` (JSON)" >> $GITHUB_STEP_SUMMARY
        echo "- \`/usr/local/share/installed-software.spdx.json\` (SPDX 2.3)" >> $GITHUB_STEP_SUMMARY
        echo "- \`/usr/local/share/installed-software.cdx.json\` (CycloneDX 1.6)" >> $GITHUB_STEP_SUMMARY
