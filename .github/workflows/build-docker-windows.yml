name: 🐋 Build Docker Images (Windows)

on:
  workflow_dispatch:
    inputs:
      workload_set_version:
        description: 'Specific workload set version to use'
        required: false
        type: string
      dotnet_versions:
        description: 'JSON array of .NET versions to build (e.g., ["9.0", "10.0"])'
        required: false
        type: string
        default: '["9.0", "10.0"]'
  repository_dispatch:
    types: [trigger-docker-windows-build]

permissions:
  contents: read
  packages: write

jobs:
  build-windows:
    name: 🪟 Build Windows (.NET ${{ matrix.DOTNET_VERSION }})
    runs-on: windows-latest

    strategy:
      matrix:
        DOTNET_VERSION: ${{ fromJson(inputs.dotnet_versions || '["9.0", "10.0"]') }}

    steps:
    - name: 🛒 Checkout
      uses: actions/checkout@v4

    - name: 📋 Set Variables
      id: vars
      run: |
        # Determine workload set version from either workflow_dispatch input or repository_dispatch payload
        if ("${{ github.event_name }}" -eq "repository_dispatch") {
          $env:WORKLOAD_SET_VERSION = "${{ github.event.client_payload.workload_set_version }}"
        } else {
          $env:WORKLOAD_SET_VERSION = "${{ inputs.workload_set_version }}"
        }
        echo "workload_set_version=$env:WORKLOAD_SET_VERSION" >> $env:GITHUB_OUTPUT
        Write-Host "Using workload set version: $env:WORKLOAD_SET_VERSION"

        # Get short Git SHA for unique build tagging
        $BUILD_SHA = git rev-parse --short=8 HEAD
        echo "build_sha=$BUILD_SHA" >> $env:GITHUB_OUTPUT
        Write-Host "Build SHA: $BUILD_SHA"

    - name: 🐋 Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🔨 Build Docker Image
      id: build
      shell: pwsh
      run: |
        # Build arguments
        $buildArgs = @{
          DotNetVersion     = "${{ matrix.DOTNET_VERSION }}"
          Version           = "${{ github.run_id }}"
          DockerPlatform    = "windows/amd64"
          BuildSha          = "${{ steps.vars.outputs.build_sha }}"
          Load              = $true
        }

        if ("${{ github.ref }}" -eq "refs/heads/main") {
          $buildArgs.Push = $true
        }

        # Add workload set version if specified
        if ("${{ steps.vars.outputs.workload_set_version }}" -ne "") {
          $buildArgs.WorkloadSetVersion = "${{ steps.vars.outputs.workload_set_version }}"
        }

        ./docker/build.ps1 @buildArgs

    - name: 📋 Generate Build Summary
      if: always()
      shell: pwsh
      run: |
        $summary = @"
        ## 🪟 Windows Docker Build — .NET ${{ steps.build.outputs.dotnet_version || matrix.DOTNET_VERSION }}

        ### Installed Software Versions

        | Component | Version |
        |-----------|---------|
        | .NET SDK | ${{ steps.build.outputs.dotnet_version || matrix.DOTNET_VERSION }} |
        | Workload Set | ${{ steps.build.outputs.workload_set_version || 'auto-detected' }} |
        | Android SDK API Level | ${{ steps.build.outputs.android_api_level || '—' }} |
        | Android Build Tools | ${{ steps.build.outputs.android_build_tools || '—' }} |
        | Android Cmdline Tools | ${{ steps.build.outputs.android_cmdline_tools || '—' }} |
        | JDK | ${{ steps.build.outputs.jdk_version || '—' }} |
        | GitHub Actions Runner | ${{ steps.build.outputs.github_actions_runner || '—' }} |
        | Platform | ${{ steps.build.outputs.docker_platform || 'windows/amd64' }} |
        | Build SHA | ``${{ steps.vars.outputs.build_sha }}`` |

        "@
        $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

        # Image tags
        $tags = "${{ steps.build.outputs.image_tags }}"
        if ($tags) {
          "### Image Tags`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          foreach ($tag in $tags.Split('|')) {
            if ($tag) {
              "- ``$tag``" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            }
          }

          $firstTag = $tags.Split('|')[0]
          @"

        ### Quick Start

        ``````bash
        docker pull $firstTag
        ``````
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
        }

        @"

        ### SBOM

        Software Bill of Materials is embedded in the image at:
        - ``C:/ProgramData/installed-software.json`` (JSON)
        - ``C:/ProgramData/installed-software.spdx.json`` (SPDX 2.3)
        - ``C:/ProgramData/installed-software.cdx.json`` (CycloneDX 1.6)
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
